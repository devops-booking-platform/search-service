version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: search-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    volumes:
      - mongo_data:/data/db
    networks:
      - shared-net

  mongo-express:
    image: mongo-express:1
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpass
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
    depends_on:
      - mongo
    networks:
      - shared-net

  search-service:
    build:
      context: ./SearchService
      dockerfile: Dockerfile
    container_name: search-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

      - Mongo__ConnectionString=mongodb://root:rootpass@mongo:27017
      - Mongo__Database=SearchDb
      - Mongo__AccommodationsCollection=accommodations

      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=guest
      - RabbitMq__Pass=guest
      - RabbitMq__VirtualHost=/
      - RabbitMq__Exchange=integration
    depends_on:
      - mongo
    networks:
      - shared-net

volumes:
  mongo_data:

networks:
  shared-net:
    external: true
    name: shared-net
